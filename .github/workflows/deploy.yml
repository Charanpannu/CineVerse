# ============================================
# CineVerse — GitHub Actions CI/CD Pipeline
# Deploys static site to GitHub Pages
# ============================================

name: 🎬 Deploy CineVerse to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:   # Allow manual trigger

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # ── Job 1: Validate & Test ──
  validate:
    name: ✅ Validate Files
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Check required files exist
        run: |
          echo "Checking project structure..."
          test -f index.html     && echo "✅ index.html found"        || (echo "❌ index.html missing" && exit 1)
          test -f booking.html   && echo "✅ booking.html found"      || (echo "❌ booking.html missing" && exit 1)
          test -f confirmation.html && echo "✅ confirmation.html found" || (echo "❌ confirmation.html missing" && exit 1)
          test -f css/main.css   && echo "✅ css/main.css found"      || (echo "❌ css/main.css missing" && exit 1)
          test -f css/home.css   && echo "✅ css/home.css found"      || (echo "❌ css/home.css missing" && exit 1)
          test -f css/booking.css && echo "✅ css/booking.css found"  || (echo "❌ css/booking.css missing" && exit 1)
          test -f css/confirmation.css && echo "✅ css/confirmation.css found" || (echo "❌ css/confirmation.css missing" && exit 1)
          test -f js/data.js     && echo "✅ js/data.js found"        || (echo "❌ js/data.js missing" && exit 1)
          test -f js/home.js     && echo "✅ js/home.js found"        || (echo "❌ js/home.js missing" && exit 1)
          test -f js/booking.js  && echo "✅ js/booking.js found"     || (echo "❌ js/booking.js missing" && exit 1)
          test -f js/confirmation.js && echo "✅ js/confirmation.js found" || (echo "❌ js/confirmation.js missing" && exit 1)
          echo ""
          echo "🎉 All required files present!"

      - name: 📊 Show project size
        run: |
          echo "Project file sizes:"
          find . -not -path './.git/*' -type f | sort | while read f; do
            size=$(wc -c < "$f")
            echo "  $size bytes  $f"
          done
          echo ""
          total=$(find . -not -path './.git/*' -type f -exec wc -c {} + | tail -1 | awk '{print $1}')
          echo "📦 Total size: $total bytes"

      - name: 🔎 Validate HTML structure
        run: |
          echo "Checking HTML files for basic structure..."
          for f in index.html booking.html confirmation.html; do
            grep -q "<!DOCTYPE html>" $f && echo "✅ $f has DOCTYPE" || echo "⚠️  $f missing DOCTYPE"
            grep -q "<title>" $f && echo "✅ $f has title tag" || echo "⚠️  $f missing title"
            grep -q "meta name=\"description\"" $f && echo "✅ $f has meta description" || echo "⚠️  $f missing meta description"
          done
          echo "HTML validation complete!"

  # ── Job 2: Deploy to GitHub Pages ──
  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦 Upload site as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 🎉 Deployment complete
        run: |
          echo "=========================================="
          echo "🎬 CineVerse deployed successfully!"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
          echo "=========================================="
