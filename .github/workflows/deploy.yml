# ============================================
# CineVerse — GitHub Actions CI/CD Pipeline
# Continuous Integration & Deployment
# ============================================

name: 🎬 CineVerse CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:   # Allow manual trigger

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # ── Job 1: Validate & Build (Continuous Integration) ──
  validate-and-build:
    name: ✅ Validate & Build Docker
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Check required files exist
        run: |
          echo "Checking project structure..."
          test -f index.html     && echo "✅ index.html found"        || (echo "❌ index.html missing" && exit 1)
          test -f Dockerfile     && echo "✅ Dockerfile found"        || (echo "❌ Dockerfile missing" && exit 1)
          test -f nginx.conf     && echo "✅ nginx.conf found"        || (echo "❌ nginx.conf missing" && exit 1)
          echo "🎉 All required files present!"

      - name: 🔎 Validate HTML structure
        run: |
          echo "Checking HTML files for basic structure..."
          for f in index.html booking.html confirmation.html; do
            grep -q "<!DOCTYPE html>" $f && echo "✅ $f has DOCTYPE" || echo "⚠️  $f missing DOCTYPE"
          done
          echo "HTML validation complete!"

      - name: 🐳 Build Docker Image (CI Test)
        run: docker build -t cineverse-app .

  # ── Job 2: Simulated Docker CD & Cloud Deployment ──
  deploy-docker:
    name: 🚀 Continuous Deployment (Docker)
    needs: validate-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Build Docker Image
        run: docker build -t charanpannu/cineverse-app:latest .

      # Simulated DockerHub Login & Push to match assignment requirements
      # In reality, this would require Docker credentials in GitHub Secrets
      - name: 🔑 Login to DockerHub (Simulated)
        run: echo "Simulating Docker login... Successful!"

      - name: 📤 Push Image (Simulated)
        run: echo "Simulating docker push charanpannu/cineverse-app:latest..."

      - name: ☁️ Deploy to Cloud Server (Simulated)
        run: |
          echo "Pulling latest image on production server..."
          echo "Restarting NGINX reverse proxy..."
          echo "Deployment successful!"

