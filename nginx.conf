server {
    listen 80;
    server_name localhost;

    # Root directory for our static HTML files
    root /usr/share/nginx/html;
    index index.html;

    # Serve files directly
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional API routing if there was a backend
    location /api/ {
        # proxy_pass http://backend:8080;
        return 404; # No backend currently
    }
}
